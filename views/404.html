<!DOCTYPE html>
<html lang="tr">
<head>

        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);

            margin: 0 auto;
        }
        h1 {
            font-size: 72px;
            color: #ff6347; /* Domates rengi */

        }

            font-size: 18px;
            margin-top: 10px;
        }
        a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }

</head>
<body>
    <div class="container">
        <h1>404</h1>
