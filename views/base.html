<!DOCTYPE html>
<html lang="tr" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LabelPro | Etiket Yönetim Sistemi{% endblock %}</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --brand-color: #0d6efd;
            --dark-sidebar: #0f172a;
            --bg-light: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: #334155;
        }

        /* Modern Navbar */
        .navbar {
            background-color: rgba(15, 23, 42, 0.95) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 0.75rem 1rem;
        }

        .navbar-brand {
            font-weight: 800;
            font-size: 2rem;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-link {
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s;
            opacity: 0.8;
        }

        .nav-link:hover {
            opacity: 1;
            color: var(--brand-color) !important;
        }

        /* Yazıcı Durum Göstergesi */
        .printer-status {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #64748b; /* Pasif */
        }

        .status-online .status-dot { background-color: #22c55e; box-shadow: 0 0 8px #22c55e; }

        /* İçerik Kartı */
        .main-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            padding: 2rem;
            margin-bottom: 3rem;
        }

        /* Yazdırma Kuralları */
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .main-card { border: none; box-shadow: none; padding: 0; }
        }
    </style>

    {% block head_extra %}{% endblock %}
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top no-print">
        <div class="container">
            <a class="navbar-brand" href="/upload">
                <i class="bi bi-qr-code-scan text-primary"></i>
                <span>LABEL<span class="text-primary">PRO</span></span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    {% if session and session.logged_in %}
                    <li class="nav-item">
                        <a class="nav-link" href="/upload"><i class="bi bi-cloud-upload me-1"></i> Dosya Yükle</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/table_view"><i class="bi bi-table me-1"></i> Veri Tablosu</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/print_preview"><i class="bi bi-printer me-1"></i> Önizleme</a>
                    </li>
                    {% endif %}
                </ul>

                <div class="d-flex align-items: center gap-3">
                    <div id="bpacStatus" class="printer-status text-light">
                        <div class="status-dot"></div>
                        <span id="statusText">P900W Bağlı Değil</span>
                    </div>

                    {% if session and session.logged_in %}
                    <a href="/logout" class="btn btn-outline-danger btn-sm rounded-pill px-3">
                        <i class="bi bi-box-arrow-right"></i> Çıkış
                    </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-12">
                <div class="main-card">
                    {% block content %}{% endblock %}
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Yazıcı durumunu sunucudan sorgulayan fonksiyon
        function updatePrinterStatus() {
            const statusBox = document.getElementById('bpacStatus');
            const statusText = document.getElementById('statusText');

            fetch('/printer_status')
                .then(response => response.json())
                .then(data => {
                    if (data.online) {
                        statusBox.classList.add('status-online');
                        statusText.innerText = "P900W Bağlı";
                    } else {
                        statusBox.classList.remove('status-online');
                        statusText.innerText = "P900W Bağlı Değil";
                    }
                })
                .catch(err => {
                    statusBox.classList.remove('status-online');
                    statusText.innerText = "Yazıcı Servisi Hatası";
                });
        }

        // Sayfa yüklendiğinde ve her 5 saniyede bir kontrol et
        window.addEventListener('load', () => {
            updatePrinterStatus();
            setInterval(updatePrinterStatus, 5000);
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
