name: Build Windows EXE (pkg) & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

# GitHub'ın Haziran 2026 kurallarına göre uyarılardan kurtulmak için resmi değişkenler
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tag işlemleri için çok önemli!

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Install pkg
        run: npm install -g pkg

      - name: Build exe with pkg
        run: npm run build:pkg

      - name: List dist
        run: dir dist

      # Manuel tetiklemelerde veya tag durumlarında etiket kontrolü (PowerShell)
      - name: Create tag if not exists
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          if ("${{ github.ref_name }}" -like "v*") {
              echo "Running on explicit tag: ${{ github.ref_name }}"
          } else {
              git tag v1.0.0 2>$null || echo "Tag already exists"
              git push origin v1.0.0 2>$null || echo "Tag already pushed"
          }
        shell: powershell

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v1.0.0' }}
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
