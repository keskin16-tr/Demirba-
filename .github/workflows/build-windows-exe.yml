name: Build Windows EXE (pkg) & Release

on:
push:
tags:
- 'v*'
workflow_dispatch:

permissions:
contents: write

jobs:
build-exe:
runs-on: windows-latest

```
steps:
  - name: Checkout repo
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: '18'
      cache: 'npm'

  - name: Install dependencies
    run: npm ci

  - name: Install pkg
    run: npm install -g pkg

  - name: Build exe with pkg
    run: npm run build:pkg

  - name: Show dist contents
    shell: powershell
    run: |
      if (!(Test-Path "dist")) {
        Write-Error "dist folder not found"
        exit 1
      }

      Get-ChildItem dist

  - name: Create GitHub Release
    uses: softprops/action-gh-release@v2
    with:
      files: dist/*.exe
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
