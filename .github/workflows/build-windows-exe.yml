name: Build Windows EXE (pkg) & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.1.2 # Node 24 uyumlu güncel alt sürüm
        with:
          fetch-depth: 0   # tag işlemleri için çok önemli!

      - name: Setup Node.js
        uses: actions/setup-node@v4.0.2 # Node 24 uyumlu güncel alt sürüm
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Install pkg
        run: npm install -g pkg

      - name: Build exe with pkg
        run: npm run build:pkg

      - name: List dist
        run: dir dist

      # Bu adım tetiklenen tag'i kontrol eder, eğer manuel workflow_dispatch ile çalıştırıldıysa varsayılan v1.0.0 oluşturur.
      - name: Create tag if not exists
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          if ("${{ github.ref_name }}" -like "v*") {
              echo "Running on explicit tag: ${{ github.ref_name }}"
          } else {
              git tag v1.0.0 2>$null || echo "Tag already exists"
              git push origin v1.0.0 2>$null || echo "Tag already pushed"
          }
        shell: powershell

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2 # Eski Node bağımlılığından kurtulmak için v2'ye yükseltildi
        with:
          # Eğer tag push ile tetiklendiyse o tag'i kullanır, workflow_dispatch ise v1.0.0 kullanır
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v1.0.0' }}
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
