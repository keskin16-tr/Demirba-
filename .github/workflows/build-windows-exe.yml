name: Build Windows EXE (pkg) & Release

on:
  push:
    branches:
      - main    # Eğer ana dalınız 'master' ise burayı master yapın
    tags:
      - 'v*'
  workflow_dispatch: {}

# GitHub Actions botuna repoya yazma ve release oluşturma yetkisi verir
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Install pkg
        run: npm install -g pkg

      - name: Build exe with pkg
        run: npm run build

      - name: List dist
        run: dir dist

      # Geliştirilmiş, hata fırlatmayan akıllı Git Tag kontrolü
      - name: Create tag if not exists
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          if ("${{ github.ref_name }}" -like "v*") {
              Write-Host "Running on explicit tag: ${{ github.ref_name }}"
          } else {
              # Uzak sunucudaki (GitHub) tag'leri kontrol et
              $remoteTags = git ls-remote --tags origin
              if ($remoteTags -match "refs/tags/v1.0.1") {
                  Write-Host "Tag v1.0.1 zaten GitHub üzerinde var. İşlem atlanıyor."
              } else {
                  Write-Host "Tag v1.0.1 bulunamadı, oluşturuluyor..."
                  git tag v1.0.1
                  # Hata oluşsa bile adımı çökertmemek için try-catch yapısı
                  try {
                      git push origin v1.0.1
                  } catch {
                      Write-Warning "Tag push edilemedi, muhtemelen yetki hatası veya tag zaten var."
                  }
              }
          }
        shell: powershell

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v1.0.1' }}
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
