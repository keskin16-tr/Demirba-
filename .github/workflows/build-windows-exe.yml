name: Build Windows EXE (pkg) & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

env:
  # GitHub Actions'ın zorunlu Node 24 geçiş uyarısını tamamen susturur
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # Tag bazlı release işlemleri için kritik

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      # Katı lock dosyası kontrolü yerine bağımlılıkları esnek ve güvenli yükler
      - name: Install dependencies
        run: npm install

      - name: Install pkg
        run: npm install -g pkg

      - name: Build exe with pkg
        run: npm run build:pkg

      - name: List dist
        run: dir dist

      # Windows PowerShell ortamında hata fırlatmayan güvenli Git kontrolü
      - name: Create tag if not exists
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          if ("${{ github.ref_name }}" -like "v*") {
              Write-Host "Running on explicit tag: ${{ github.ref_name }}"
          } else {
              try {
                  git tag v1.0.1 2>$null
                  git push origin v1.0.1 2>$null
              } catch {
                  Write-Host "Tag already exists or pushed."
              }
          }
        shell: powershell

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v1.0.1' }}
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
