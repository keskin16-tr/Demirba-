name: Build Windows EXE (pkg) & Release

on:
push:
tags:
- 'v*'
workflow_dispatch:

permissions:
contents: write

jobs:
build-exe:
runs-on: windows-latest

```
steps:
  - name: Checkout repo
    uses: actions/checkout@v4
    with:
      fetch-depth: 0

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 18
      cache: npm

  - name: Install dependencies
    run: npm ci

  - name: Install pkg
    run: npm install -g pkg

  - name: Build exe with pkg
    run: npm run build:pkg

  - name: Verify build output
    shell: powershell
    run: |
      if (!(Test-Path "dist")) {
        Write-Error "dist folder not found"
        exit 1
      }

      Get-ChildItem dist

  - name: Create tag if not exists
    if: github.event_name == 'workflow_dispatch'
    shell: powershell
    run: |
      $tag = "v1.0.0"

      git fetch --tags

      if (git tag -l $tag) {
        Write-Host "Tag already exists."
      }
      else {
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

        git tag $tag
        git push origin $tag
      }

  - name: Create GitHub Release
    uses: softprops/action-gh-release@v2
    with:
      tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v1.0.0' }}
      files: dist/*.exe
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
